metricbeat.modules:

- module: elasticsearch
  xpack.enabled: true
  period: 10s

  hosts: ["http://host.docker.internal:9200"]

- module: kibana
  metricsets:
    - stats
  period: 10s

  hosts: ["http://host.docker.internal:5601"]

output.elasticsearch:
  hosts: ["http://host.docker.internal:9200"]

setup.kibana:
  host: "http://host.docker.internal:5601"